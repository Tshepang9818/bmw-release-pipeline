services:
  - type: web
    name: bmw-release-pipeline
    runtime: docker
    dockerfilePath: ./app/Dockerfile
    dockerContext: ./app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bmw-db
          property: connectionString
    healthCheckPath: /health

databases:
  - name: bmw-db
    plan: free
