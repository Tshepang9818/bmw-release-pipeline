version: "3.8"
services:
  postgres:
    image: postgres:15
    env_file: .env
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: ./app
    env_file: .env
    depends_on: [postgres]
    ports:
      - "8001:8000"
    restart: on-failure

volumes:
  pgdata:
